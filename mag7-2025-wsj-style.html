const data = raw
  .filter(d => d[4] !== "skip" && d[2] > 0)
  .map(d => ({
    symbol: d[0], name: d[1], weight: d[2], ytd: d[3], group: d[4],
    pts: (d[2] / 100) * (d[3] / 100) * SP500_BASE,
  }));

// Chart dimensions
const SVG_W = 680, SVG_H = 480;
const L = 72, R = 20, T = 56, B = 50;
const CW = SVG_W - L - R;
const CH = SVG_H - T - B;

// Axis ranges — x is intentionally clipped for extreme return outliers.
const X_MIN = -30, X_MAX = 80;
const Y_STEP = 20;
const yVals = data.map(d => d.pts);
const yMinData = Math.min(...yVals, 0);
const yMaxData = Math.max(...yVals, 0);
const yPad = Math.max(12, (yMaxData - yMinData) * 0.08);
const Y_MIN = Math.floor((yMinData - yPad) / Y_STEP) * Y_STEP;
const Y_MAX = Math.ceil((yMaxData + yPad) / Y_STEP) * Y_STEP;

function xScale(v) { return L + ((Math.max(X_MIN, Math.min(X_MAX, v)) - X_MIN) / (X_MAX - X_MIN)) * CW; }
function yScale(v) { return T + CH - ((v - Y_MIN) / (Y_MAX - Y_MIN)) * CH; }
const DOT_R = 4.5;

const zeroX = xScale(0);
const zeroY = yScale(0);

const xTicks = [-20, 0, 20, 40, 60, 80];
const yTicks = [];
for (let t = Y_MIN; t <= Y_MAX; t += Y_STEP) yTicks.push(t);

const svg = document.getElementById('chart');

// Helper
function el(tag, attrs, parent) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}
function txt(content, attrs, parent) {
  const e = el('text', attrs, parent);
  e.textContent = content;
  return e;
}

// Background
el('rect', { x: L, y: T, width: CW, height: CH, fill: '#FFFCF7' }, svg);

// Grid — horizontal only
for (const t of yTicks) {
  const y = yScale(t);
  el('line', {
    x1: L, x2: L + CW, y1: y, y2: y,
    stroke: t === 0 ? '#bbb' : '#ddd',
    'stroke-width': t === 0 ? 1 : 0.7,
    'stroke-dasharray': t === 0 ? 'none' : '3,4',
  }, svg);
  txt(t === 0 ? '0' : (t > 0 ? `+${t}` : `${t}`), {
    x: L - 7, y: y, dy: '0.35em',
    'text-anchor': 'end',
    'font-family': "'Libre Franklin', sans-serif",
    'font-size': 11, fill: '#999',
  }, svg);
}

// Zero vertical line
el('line', { x1: zeroX, x2: zeroX, y1: T, y2: T + CH, stroke: '#bbb', 'stroke-width': 1 }, svg);

// X-axis ticks & labels
for (const t of xTicks) {
  const x = xScale(t);
  el('line', { x1: x, x2: x, y1: T + CH, y2: T + CH + 4, stroke: '#bbb', 'stroke-width': 1 }, svg);
  txt(t === 0 ? '0%' : (t > 0 ? `+${t}%` : `${t}%`), {
    x, y: T + CH + 15,
    'text-anchor': 'middle',
    'font-family': "'Libre Franklin', sans-serif",
    'font-size': 11, fill: '#999',
  }, svg);
}

// Axis bottom line
el('line', { x1: L, x2: L + CW, y1: T + CH, y2: T + CH, stroke: '#bbb', 'stroke-width': 1 }, svg);
el('line', { x1: L, x2: L, y1: T, y2: T + CH, stroke: '#bbb', 'stroke-width': 1 }, svg);

// Y-axis label
const yLabel = el('text', {
  x: 0, y: 0,
  transform: `translate(13,${T + CH / 2}) rotate(-90)`,
  'text-anchor': 'middle',
  'font-family': "'Libre Franklin', sans-serif",
  'font-size': 11, fill: '#999',
}, svg);
yLabel.textContent = 'Index point contribution';

// X-axis label
txt('2025 return', {
  x: L + CW / 2, y: SVG_H - 6,
  'text-anchor': 'middle',
  'font-family': "'Libre Franklin', sans-serif",
  'font-size': 11, fill: '#999',
}, svg);

// "Clipped" note for outliers
txt('† extreme x-axis outliers are clipped', {
  x: L + CW, y: T - 4,
  'text-anchor': 'end',
  'font-family': "'Libre Franklin', sans-serif",
  'font-size': 9.5, fill: '#bbb', 'font-style': 'italic',
}, svg);

// Colors
const COL = {
  other:  { fill: '#2E5B88', fillOp: 0.25, stroke: '#2E5B88', strokeW: 0.8 },
  mag7:   { fill: '#C4533A', fillOp: 0.85, stroke: '#C4533A', strokeW: 1.2 },
  oracle: { fill: '#2E5B88', fillOp: 0.25, stroke: '#2E5B88', strokeW: 0.8 },
};

// Render: other first (behind), then mag7, then oracle on top
const order = ['other', 'mag7', 'oracle'];
const tooltip = document.getElementById('tooltip');
const highlighted = [];

for (const grp of order) {
  for (const d of data.filter(x => x.group === grp)) {
    const cx = xScale(d.ytd);
    const cy = yScale(d.pts);
    const r  = DOT_R;
    const c  = COL[grp];
    const isClipped = d.ytd < X_MIN || d.ytd > X_MAX;

    const circle = el('circle', {
      cx, cy, r,
      fill: c.fill,
      'fill-opacity': c.fillOp,
      stroke: c.stroke,
      'stroke-width': c.strokeW,
      style: 'cursor:pointer',
    }, svg);

    if (isClipped) {
      // Small dagger marker instead
      circle.setAttribute('fill-opacity', 0);
      circle.setAttribute('stroke-opacity', 0);
    }

    // Collect highlighted points; labels are placed after a collision-avoidance pass.
    if (grp === 'mag7' || grp === 'oracle') {
      highlighted.push({ symbol: d.symbol, cx, cy, r });
    }

    // Tooltip
    circle.addEventListener('mouseenter', (e) => {
      tooltip.style.display = 'block';
      const sign = v => v >= 0 ? '+' : '';
      tooltip.innerHTML = `
        <div class="tt-symbol">${d.symbol}</div>
        <div class="tt-name">${d.name}</div>
        <div class="tt-grid">
          <div><div class="tt-label">YTD</div><div class="tt-val" style="color:${d.ytd>=0?'#2E5B88':'#C4533A'}">${sign(d.ytd)}${d.ytd.toFixed(1)}%</div></div>
          <div><div class="tt-label">Pts</div><div class="tt-val" style="color:${d.pts>=0?'#2E5B88':'#C4533A'}">${sign(d.pts)}${d.pts.toFixed(1)}</div></div>
          <div><div class="tt-label">Wt</div><div class="tt-val" style="color:#555">${d.weight.toFixed(2)}%</div></div>
        </div>
        ${grp !== 'other' ? `<div class="tt-tag" style="color:#C4533A">Magnificent 7</div>` : ''}
      `;
    });
    circle.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top  = (e.clientY - 20) + 'px';
    });
    circle.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
  }
}

function placeHighlightLabels(points) {
  const fontSize = 9.5;
  const labelH = 10.5;
  const minGap = 2.5;
  const minY = T + labelH;
  const maxY = T + CH - 1.5;
  const rightEdge = L + CW - 22;

  const labels = points.map(p => {
    const rightSide = p.cx <= rightEdge;
    const x = rightSide ? p.cx + p.r + 5 : p.cx - p.r - 5;
    return {
      ...p,
      anchor: rightSide ? 'start' : 'end',
      x,
      y: p.cy + 3.5,
    };
  });

  function pack(side) {
    side.sort((a, b) => a.y - b.y);
    for (let i = 0; i < side.length; i++) {
      const prevY = i ? side[i - 1].y : minY;
      side[i].y = Math.max(side[i].y, prevY + (i ? labelH + minGap : 0));
    }
    if (side.length) {
      side[side.length - 1].y = Math.min(side[side.length - 1].y, maxY);
      for (let i = side.length - 2; i >= 0; i--) {
        side[i].y = Math.min(side[i].y, side[i + 1].y - (labelH + minGap));
      }
      for (let i = 0; i < side.length; i++) {
        side[i].y = Math.max(minY, Math.min(maxY, side[i].y));
      }
    }
  }

  const right = labels.filter(d => d.anchor === 'start');
  const left = labels.filter(d => d.anchor === 'end');
  pack(right);
  pack(left);

  for (const d of labels) {
    const fromX = d.cx + (d.anchor === 'start' ? d.r : -d.r);
    const toX = d.anchor === 'start' ? d.x - 2 : d.x + 2;
    const toY = d.y - 3;
    el('line', {
      x1: fromX, y1: d.cy, x2: toX, y2: toY,
      stroke: '#B05A4A', 'stroke-width': 0.8, 'stroke-opacity': 0.75
    }, svg);
    txt(d.symbol, {
      x: d.x, y: d.y,
      'text-anchor': d.anchor,
      'font-family': "'Libre Franklin', sans-serif",
      'font-size': fontSize,
      'font-weight': 600,
      fill: '#C4533A',
    }, svg);
  }
}

placeHighlightLabels(highlighted);

// Legend — back inside plot area.
function drawLegendInPlot() {
  const g = el('g', {}, svg);
  const items = [
    { label: 'S&P 500', fill: '#2E5B88', fillOp: 0.25, stroke: '#2E5B88' },
    { label: 'Magnificent 7', fill: '#C4533A', fillOp: 0.85, stroke: '#C4533A' },
  ];
  const startX = L + 16;
  const startY = T + 20;
  const rowH = 18;
  const dotR = 4;

  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const y = startY + i * rowH;
    el('circle', {
      cx: startX, cy: y, r: dotR,
      fill: item.fill, 'fill-opacity': item.fillOp,
      stroke: item.stroke, 'stroke-width': 1
    }, g);
    txt(item.label, {
      x: startX + 12, y: y + 3.5,
      'font-family': "'Libre Franklin', sans-serif",
      'font-size': 10.5, fill: '#555',
    }, g);
  }

  const b = g.getBBox();
  const bg = el('rect', {
    x: b.x - 8, y: b.y - 6, width: b.width + 16, height: b.height + 12,
    fill: '#FFFCF7', 'fill-opacity': 1
  }, g);
  g.insertBefore(bg, g.firstChild);
}

drawLegendInPlot();

</script>
