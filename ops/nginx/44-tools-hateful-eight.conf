##############################################################
# Normalize hateful-eight path (no slash -> slash)
##############################################################
location = /tools/hateful-eight {
    return 301 /tools/hateful-eight/;
}

##############################################################
# Hateful Eight static app assets (paid only)
##############################################################
location /tools/hateful-eight/app/ {
    auth_request /_ghost_paid_proxy;
    error_page 401 =302 https://paulkedrosky.com/#/portal/signup;

    alias /srv/repos/hateful-eight/dist/;
    try_files $uri $uri/ /tools/hateful-eight/app/index.html;
}
